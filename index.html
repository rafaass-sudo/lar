<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Registrasi OTP Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div id="auth-container" class="glass max-w-md w-full p-8 rounded-2xl shadow-2xl border border-white">
        
        <div id="step-register">
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Buat Akun</h2>
            <p class="text-slate-500 mb-6 text-sm">Silakan daftar untuk masuk ke dashboard.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Aktif</label>
                    <input type="email" id="email" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="nama@gmail.com">
                </div>
                <button onclick="sendOTP()" id="btn-send" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition shadow-lg flex items-center justify-center">
                    <span>Kirim Kode Verifikasi</span>
                </button>
            </div>
        </div>

        <div id="step-verify" class="hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Verifikasi Email</h2>
            <p class="text-slate-500 mb-6 text-sm">Kode OTP telah dikirim ke email Anda.</p>
            
            <div class="space-y-4">
                <input type="text" id="otp-input" maxlength="6" class="w-full text-center text-2xl tracking-[1em] font-bold px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-green-500 outline-none" placeholder="000000">
                <button onclick="verifyOTP()" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition shadow-lg">
                    Verifikasi Sekarang
                </button>
                <button onclick="location.reload()" class="w-full text-sm text-slate-400 hover:text-slate-600 transition">Ganti Email</button>
            </div>
        </div>

        <div id="step-dashboard" class="hidden">
            <div class="text-center">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-check text-4xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">Selamat Datang!</h2>
                <p id="user-display" class="text-slate-500 mb-6 font-medium"></p>
                
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 text-left mb-6">
                    <p class="text-xs text-slate-400 uppercase font-bold tracking-wider mb-2">Status Akun</p>
                    <div class="flex items-center text-green-600 font-semibold">
                        <i class="fa-solid fa-shield-check mr-2"></i> Terverifikasi OTP
                    </div>
                </div>
                <button onclick="location.reload()" class="w-full bg-slate-800 text-white py-2 rounded-lg">Logout</button>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI EMAILJS ---
        (function() {
            emailjs.init("A5VCqiv7TWchHQ65q"); // Ganti dengan Public Key Anda
        })();

        let generatedOTP;
        const serviceID = "service_dexnzhe"; // Ganti dengan Service ID Anda
        const templateID = "template_2vdb35a"; // Ganti dengan Template ID Anda

        async function sendOTP() {
            const email = document.getElementById('email').value;
            const btn = document.getElementById('btn-send');

            if (!email.includes('@')) {
                alert('Masukkan email yang valid!');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Memproses...';

            // Generate 6 digit OTP
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();

            const templateParams = {
                to_email: email,
                otp: generatedOTP
            };

            try {
                await emailjs.send(serviceID, templateID, templateParams);
                alert('OTP terkirim ke ' + email);
                document.getElementById('step-register').classList.add('hidden');
                document.getElementById('step-verify').classList.remove('hidden');
            } catch (error) {
                alert('Gagal mengirim email: ' + JSON.stringify(error));
                btn.disabled = false;
                btn.innerText = 'Kirim Kode Verifikasi';
            }
        }

        function verifyOTP() {
            const input = document.getElementById('otp-input').value;
            const email = document.getElementById('email').value;

            if (input === generatedOTP) {
                document.getElementById('step-verify').classList.add('hidden');
                document.getElementById('step-dashboard').classList.remove('hidden');
                document.getElementById('user-display').innerText = email;
            } else {
                alert('Kode OTP salah! Periksa kembali email Anda.');
            }
        }
    </script>
</body>
</html>
