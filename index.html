<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEND MAIL OTOMATIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 450px; }
        h2 { color: #333; margin-bottom: 20px; text-align: center; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #764ba2; box-shadow: 0 0 8px rgba(118, 75, 162, 0.2); }
        
        button { width: 100%; padding: 12px; background: #764ba2; border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #5a397e; transform: translateY(-2px); }
        
        #status { margin-top: 15px; text-align: center; font-size: 14px; }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h2>Hubungi Kami</h2>
    <form id="contact-form">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" name="user_name" id="userName" placeholder="Contoh: Budi Santoso" required>
        </div>
        <div class="form-group">
            <label>Email Tujuan</label>
            <input type="email" name="user_email" id="userEmail" placeholder="email@tujuan.com" required>
        </div>
        <div class="form-group">
            <label>Pesan</label>
            <textarea name="message" id="message" rows="4" placeholder="Tulis sesuatu..." required></textarea>
        </div>
        <button type="submit" id="btn-send">Kirim Email Sekarang</button>
        <p id="status"></p>
    </form>
</div>

<script type="text/javascript">
    (function() {
        // GANTI dengan Public Key Anda dari EmailJS
        emailjs.init("A5VCqiv7TWchHQ65q");
    })();

    const btn = document.getElementById('btn-send');
    const statusTxt = document.getElementById('status');

    document.getElementById('contact-form').addEventListener('submit', function(event) {
        event.preventDefault();

        btn.innerText = 'Mengirim...';
        btn.disabled = true;

        // GANTI "YOUR_SERVICE_ID" dan "YOUR_TEMPLATE_ID" dengan milik Anda
        emailjs.sendForm('service_dexnzhe', 'template_2vdb35a', this)
            .then(function() {
                statusTxt.innerHTML = '<span class="success">Email Berhasil Terkirim!</span>';
                btn.innerText = 'Kirim Email Sekarang';
                btn.disabled = false;
                document.getElementById('contact-form').reset();
            }, function(error) {
                statusTxt.innerHTML = '<span class="error">Gagal: ' + JSON.stringify(error) + '</span>';
                btn.innerText = 'Coba Lagi';
                btn.disabled = false;
            });
    });
</script>

</body>
</html>
